server:
  addr: ":8080"
  session_ttl: 30m

openai:
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}

llm:
  base_url: ""
  api_key: ""
  model: gpt-4o
  temperature: 0.7
  max_tokens: 14000

embedding:
  base_url: ""
  api_key: ""
  model: text-embedding-3-small
  dimension: 1536

vector:
  path: ./data/chromem
  n_results:
    ddl: 10
    documentation: 10
    sql: 10

database:
  driver: duckdb
  dsn: ./data/app.duckdb
  dialect: ""

engine:
  allow_llm_to_see_data: false
  auto_train: true
  visualize: true
  language: ""
