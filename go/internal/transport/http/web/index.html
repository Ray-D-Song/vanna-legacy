<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanna Go</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; }
    .sub { color: #94a3b8; margin-bottom: 24px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } }
    textarea, input, select, button { width: 100%; box-sizing: border-box; }
    textarea, input, select { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 10px; }
    button { background: #2563eb; color: white; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; margin-top: 8px; }
    button.secondary { background: #334155; }
    .panel { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    pre, table { width: 100%; overflow: auto; }
    table { border-collapse: collapse; font-size: 14px; }
    th, td { border: 1px solid #334155; padding: 6px 8px; text-align: left; }
    #chart { width: 100%; height: 360px; }
    .error { color: #f87171; white-space: pre-wrap; }
    .meta { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Vanna Go</h1>
    <p class="sub">Text-to-SQL with chromem-go + OpenAI-compatible LLM</p>

    <div class="panel">
      <label>问题</label>
      <textarea id="question" rows="3" placeholder="例如：销售额前 10 的客户是谁？"></textarea>
      <div class="row">
        <label><input type="checkbox" id="visualize" checked /> 生成图表</label>
        <label><input type="checkbox" id="auto_train" checked /> 自动训练</label>
      </div>
      <button id="askBtn">提问</button>
      <p class="meta" id="sessionMeta"></p>
      <p class="error" id="error"></p>
    </div>

    <div class="panel">
      <h3>SQL</h3>
      <pre id="sql"></pre>
    </div>

    <div class="row">
      <div class="panel">
        <h3>图表</h3>
        <div id="chart"></div>
      </div>
      <div class="panel">
        <h3>数据</h3>
        <div id="table"></div>
      </div>
    </div>

    <div class="panel">
      <h3>训练数据</h3>
      <textarea id="trainDDL" rows="3" placeholder="DDL"></textarea>
      <textarea id="trainDoc" rows="2" placeholder="文档"></textarea>
      <button class="secondary" id="trainBtn">提交训练</button>
      <pre id="trainingList"></pre>
    </div>
  </div>
  <script src="/lib/specToEcharts.js"></script>
  <script src="/app.js"></script>
</body>
</html>
